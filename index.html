<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>時空料理 — 永恆食譜</title>
<meta name="description" content="在時間裡做菜。穿越歲月熟成食材，重建失落的料理文明。">
<meta name="theme-color" content="#3a2c1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="永恆食譜">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- ════════ 手繪食材線稿 sprite（無 emoji；stroke=currentColor，由 CSS 依 tag 著色）════════ -->

    <path d="M18 62 78 38l3 16-58 24z" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linejoin="round"/>
    <path d="M18 62 21 78" fill="none" stroke="currentColor" stroke-width="2.6"/>
    <circle cx="40" cy="58" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="54" cy="52" r="2.4" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="50" cy="66" r="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
  </symbol>

  </symbol>
  <symbol id="art-dust" viewBox="0 0 100 100">

    <g fill="currentColor"><circle cx="44" cy="60" r="1.6"/><circle cx="52" cy="56" r="1.6"/><circle cx="58" cy="62" r="1.6"/><circle cx="48" cy="64" r="1.4"/><circle cx="38" cy="64" r="1.4"/><circle cx="62" cy="58" r="1.2"/></g>
  </symbol>
  <symbol id="art-honey" viewBox="0 0 100 100">
    <path d="M36 40h28v34a6 6 0 0 1-6 6H42a6 6 0 0 1-6-6z" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linejoin="round"/>
    <path d="M33 40h34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M50 18v18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M44 24h12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M50 52v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  </symbol>

    <g fill="none" stroke="currentColor" stroke-width="1.6"><path d="M50 20 50 80M26 44 74 44M38 80 50 44 62 80"/></g>
  </symbol>
  <symbol id="art-dough" viewBox="0 0 100 100">

  </symbol>
  <symbol id="art-chick" viewBox="0 0 100 100">

    <circle cx="50" cy="40" r="10" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <path d="M59 40l9-2-9 4z" fill="currentColor"/><circle cx="52" cy="38" r="1.6" fill="currentColor"/>
    <path d="M44 76l-3 7M56 76l3 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>
  <symbol id="art-hen" viewBox="0 0 100 100">
    <ellipse cx="46" cy="58" rx="20" ry="15" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <circle cx="65" cy="44" r="9" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <path d="M61 36q3-6 5 0q3-6 5 0" fill="none" stroke="currentColor" stroke-width="2"/>

  <symbol id="art-eternal_sandwich" viewBox="0 0 100 100">

    <path d="M24 52h52" stroke="currentColor" stroke-width="2"/>
    <path d="M26 60q24 6 48 0" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M24 66h52a4 4 0 0 1-4 7H28a4 4 0 0 1-4-7z" fill="none" stroke="currentColor" stroke-width="2.4"/>
    <path d="M50 18l2 6 6 2-6 2-2 6-2-6-6-2 6-2z" fill="currentColor"/>
  </symbol>
  <symbol id="art-dragon" viewBox="0 0 100 100">
    <path d="M28 72c-3-15 8-29 24-31 12-1 22 6 22 16 0 8-6 13-14 13-7 0-11-4-11-9 0-4 3-7 7-6" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M70 50c7-3 10-9 9-17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M28 72c-5 3-11 2-14-3" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M50 41l9-7 2 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="64" cy="46" r="1.8" fill="currentColor"/>
  </symbol>
  <symbol id="art-dragon_soup" viewBox="0 0 100 100">
    <path d="M24 54h52a26 20 0 0 1-52 0z" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linejoin="round"/>
    <path d="M20 54h60" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M40 44c4-6-2-10 0-16M52 44c4-6-2-10 0-16M64 44c4-6-2-10 0-16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".7"/>
  </symbol>
</svg>

<!-- ════════ 應用 ════════ -->
<div id="app" data-era="apocalypse">

  <header class="topbar">
    <h1 class="booktitle">永恆食譜</h1>
    <p class="folio" id="folio">殘頁 · 文明終末</p>
    <span class="version" id="version"></span>
    <button class="iconbtn" id="menuBtn" aria-label="設定">設定</button>
  </header>

  <nav class="eras" id="eraNav" hidden></nav>

  <div class="exped-banner" id="expedBanner" hidden>
    <span id="expedBannerText"></span>
    <button id="expedReturn">返回現世</button>
  </div>

  <main class="page" id="pageMain">

    <section class="order" id="orderBox" hidden>
      <span class="order-tag">殘頁委託</span>
      <h2 id="orderName"></h2>
      <p class="order-desc" id="orderDesc"></p>
      <p class="order-hint" id="orderHint"></p>
    </section>

    <section class="craft" id="craftBox"></section>

    <section>
      <h2 class="sect-title">調理之頁 <span class="muted" id="invCount"></span></h2>
      <div class="inv-grid" id="invGrid"></div>
      <p class="bench-empty" id="invEmpty" hidden>空空如也。到下方「採集」取些食材吧。</p>
    </section>

    <section class="selpanel" id="selPanel" hidden>
      <div class="sel-head" id="selHead">
        <svg class="artwork sm" id="selArt" viewBox="0 0 100 100"><use href="#art-milk"/></svg>
        <div><div class="sel-name" id="selName"></div><div class="sel-age" id="selAge"></div></div>
      </div>
      <label class="axis-label">歲月之軸　<span id="axisReadout">此刻</span></label>
      <input type="range" id="axis" min="0" max="1000" value="0" step="1" aria-label="歲月之軸">
      <div class="axis-ticks" id="axisTicks"></div>
      <div class="sel-actions">
        <button class="age-btn" id="ageBtn" disabled>熟成 — 讓歲月經過</button>
        <button class="ghost" id="discardBtn">丟棄</button>
      </div>
    </section>

    <section class="pantry">
      <h2 class="sect-title">採集 · <span id="pantryEra"></span></h2>
      <div class="pantry-row" id="pantryRow"></div>
      <p class="muted" id="pantryEmpty" hidden>此地一片荒蕪，無物可採。</p>
    </section>

    <section class="exped" id="expedSection" hidden>
      <h2 class="sect-title">遠征 · 回溯古代</h2>
      <div class="exped-row" id="expedRow"></div>
    </section>

    <section class="codex">
      <h2 class="sect-title">圖鑑 — 已補回 <span id="codexCount">0</span> / <span id="codexTotal">0</span> 頁</h2>
      <div class="codex-grid" id="codexGrid"></div>
    </section>

  </main>
</div>

<!-- 發現橫幅 -->
<div class="discovery" id="discovery" hidden>
  <div class="discovery-card" id="discoveryCard">
    <div class="gild-bloom"></div>
    <svg class="discovery-art" id="discoveryArt" viewBox="0 0 100 100"><use href="#art-cheese"/></svg>
    <div class="discovery-name" id="discoveryName">起司</div>
    <div class="discovery-desc" id="discoveryDesc"></div>
    <div class="discovery-stamp">補上了一頁</div>
  </div>
</div>

<!-- 委託完成提示 -->
<div class="toast" id="toast" hidden></div>

<!-- 新手引導字幕 -->
<div class="ftue-caption" id="ftueCaption" hidden>
  <span id="ftueText"></span>
  <button id="ftueSkip" class="ftue-skip">略過引導</button>
</div>

<!-- 結局 -->
<div class="ending" id="ending" hidden>
  <div class="ending-card">
    <svg class="ending-art" viewBox="0 0 100 100"><use href="#art-eternal_sandwich"/></svg>
    <p id="endingText"></p>
    <button id="endingClose">闔上此頁，繼續探索</button>
  </div>
</div>

<!-- 設定 / 存檔 -->
<div class="modal" id="menu" hidden>
  <div class="modal-card">
    <h3>藏書閣</h3>
    <label class="row">音量 <input type="range" id="vol" min="0" max="1" step="0.05" value="0.8"></label>
    <button id="exportBtn">謄抄副本（匯出存檔）</button>
    <button id="importBtn">拓印還原（匯入存檔）</button>
    <button id="resetBtn" class="danger">焚書重來（清除進度）</button>
    <button id="closeMenu" class="ghost">闔上</button>
    <p class="hint">提示：在 iPhone 上「分享 → 加入主畫面」可離線遊玩並更穩固地保存進度。</p>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
